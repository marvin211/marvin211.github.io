<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje de Navidad</title>
    <style>
        body{ 
            background: black; 
            display: grid; 
            justify-content: center; 
            text-align: center;
        }

        h1{
            color: greenyellow; 
            text-align: center;
        }
        p{
            color: teal; 
            text-align: center;
            animation: coloresMsg 1s infinite;
            
        }
        .estrella{
            font-size: 100px; 
            animation: colores 1s infinite;
        }
        .rojo{
            color: red;
            transition: all 1.5s;
            font-size: 30px;
        
        }
        @keyframes colores {
            0%{color: red;}
            33%{color: green;}
            66%{color: red;}
            100%{color: yellow;}
        }

        @keyframes coloresMsg {
            33%{color: red;}
            66%{color: yellow;}
            100%{color: teal;}         
        }

    </style>
</head>
<body>
    <div class="estrella">*</div>

    <div id="arbol"></div>
        <h1>FELIZ NAVIDAD!! Y PR&Oacute;SPERO AÑO NUEVO 2022</h1>
        <p>“Envío para ti mis buenos deseos, que esta Navidad la celebres en la paz y serenidad de tu hogar” </p>
        <p>Atentamente: MARVIN L&Oacute;PEZ L&Oacute;PEZ</p>
    
    <script>
        var hojas= "";
        [10,2].forEach(row =>{
            Array(row).fill('').forEach((v,i)=> {
                hojas += ([
                    ...Array(9-i).fill("<span></span>"),
                    ...Array(1+i*2).fill("<span class='rojo'>*</span>"),
                    ...Array(9-i).fill("<span></span>"),

                ].join(''))
                hojas += "<br>"
            })
        });

        document.getElementById("arbol").innerHTML=hojas
        let animacion= document.querySelectorAll(".rojo")
        animacion.innerHTML = hojas

        function animar (){
            for (var i = 0; i < animacion.length; i++) {
                let tiempo = i/20 +1
                animacion[i].style.animation = "colores "+tiempo+"s infinite"
            }
        }

        window.addEventListener('load',animar);
    </script>
</body>
</html>
